<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Slide 22 - BOM Report</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
    body {
        margin: 0; padding: 0; overflow: hidden;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
    }

    .slide {
        width: 1280px; height: 720px;
        display: flex; flex-direction: column;
        padding: 22px 50px 18px;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        font-family: 'Montserrat', sans-serif;
        box-sizing: border-box;
        overflow: hidden;
        transform-origin: center center;
    }

    /* --- Header --- */
    .slide__header {
        display: flex; align-items: center; justify-content: space-between;
        flex-shrink: 0;
        margin-bottom: 12px;
    }
    .slide__title {
        font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 5px;
    }
    .slide__title i { color: #3b82f6; margin-right: 10px; }
    .slide__subtitle { font-size: 14px; color: #64748b; }
    .header__badge {
        background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 8px; padding: 8px 16px;
        font-size: 12px; color: #3b82f6; font-weight: 600;
    }
    .header__badge i { margin-right: 4px; }

    /* --- Risk callout --- */
    .risk-callout {
        background: rgba(59, 130, 246, 0.05); border: 1px solid rgba(59, 130, 246, 0.2);
        border-radius: 10px; padding: 14px 20px;
        display: flex; align-items: center; gap: 12px;
        flex-shrink: 0;
        margin-bottom: 14px;
    }
    .risk-callout__icon {
        width: 36px; height: 36px;
        background: rgba(59, 130, 246, 0.1); border-radius: 50%;
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .risk-callout__icon i { color: #3b82f6; font-size: 16px; }
    .risk-callout__text { font-size: 13px; color: #1e293b; }
    .risk-callout__text strong { color: #3b82f6; }

    /* --- Body (table + sidebar) --- */
    .slide__body {
        flex: 1; min-height: 0;
        display: flex; gap: 20px;
    }

    /* --- Card (shared) --- */
    .card {
        background: white; border-radius: 12px; padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
    }
    .card__title {
        font-size: 14px; font-weight: 600; color: #1e293b;
        display: flex; align-items: center; gap: 8px;
        margin-bottom: 15px;
    }
    .card__title i { color: #3b82f6; }

    /* --- Table panel --- */
    .panel--table {
        flex: 1.5; display: flex; flex-direction: column;
    }
    .panel--table .card__header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 15px;
    }
    .btn-export {
        background: #3b82f6; color: white; padding: 6px 14px;
        border-radius: 8px; font-size: 12px; font-weight: 600;
    }
    .btn-export i { margin-right: 4px; }

    .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .data-table th {
        background: #f1f5f9; color: #1e293b; font-weight: 600;
        padding: 10px 12px; text-align: left; border-bottom: 2px solid #e2e8f0;
    }
    .data-table td { padding: 9px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; }
    .data-table th--right, .data-table td--right { text-align: right; }
    .data-table th--center, .data-table td--center { text-align: center; }
    .row-blue { background: rgba(59, 130, 246, 0.05); }
    .td--code { font-weight: 600; color: #3b82f6; }
    .td--green { color: #10b981; }
    .td--yellow { color: #f59e0b; font-weight: 600; }
    .td--red { color: #ef4444; font-weight: 600; }

    .badge-ok { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-warning { background: rgba(245, 158, 11, 0.1); color: #f59e0b; padding: 3px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge i { margin-right: 4px; }

    /* --- Sidebar --- */
    .panel--sidebar {
        flex: 0.7; display: flex; flex-direction: column; gap: 15px;
    }

    .summary-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 10px; border-radius: 8px;
    }
    .summary-row--default { background: #f8fafc; }
    .summary-row--green { background: rgba(16, 185, 129, 0.05); }
    .summary-row--red { background: rgba(239, 68, 68, 0.05); }
    .summary-row__label { font-size: 12px; color: #64748b; }
    .summary-row__value { font-size: 16px; font-weight: 700; color: #1e293b; }
    .summary-row__value--green { color: #10b981; }
    .summary-row__value--red { color: #ef4444; }
    .summary-row__indicator {
        display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot--green { background: #10b981; }
    .dot--red { background: #ef4444; }

    .summary-list { display: flex; flex-direction: column; gap: 12px; }

    /* --- Donut chart --- */
    .donut-wrapper { text-align: center; }
    .donut-label { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .donut {
        width: 80px; height: 80px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto;
    }
    .donut__inner {
        width: 60px; height: 60px; border-radius: 50%; background: white;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px; font-weight: 700; color: #10b981;
    }

    /* --- Footer --- */
    .screenshot-frame { border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; flex: 1; min-height: 0; }
    .screenshot-frame img { width: 100%; height: 100%; object-fit: contain; object-position: top left; display: block; }

    .slide__footer {
        flex-shrink: 0;
        display: flex; justify-content: space-between; align-items: center;
        padding-top: 10px;
    }
    .screenshot-frame { border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; flex: 1; min-height: 0; }
    .screenshot-frame img { width: 100%; height: 100%; object-fit: contain; object-position: top left; display: block; }

    .slide__footer-text { font-size: 13px; color: #64748b; }
    .screenshot-frame { border-radius: 8px; overflow: hidden; border: 1px solid #e2e8f0; flex: 1; min-height: 0; }
    .screenshot-frame img { width: 100%; height: 100%; object-fit: contain; object-position: top left; display: block; }

    .slide__footer-text i { margin-right: 8px; color: #3b82f6; }
</style>
</head>
<body>
<div class="slide">
    <!-- Header -->
    <div class="slide__header">
        <div>
            <div class="slide__title">
                <i class="fas fa-sitemap"></i>BOM Report
            </div>
            <div class="slide__subtitle">Phát hiện bất thường trong dữ liệu định mức sản xuất</div>
        </div>
        <div class="header__badge">
            <i class="fas fa-exclamation-circle"></i>3 issues
        </div>
    </div>

    <!-- Risk callout -->
    <div class="risk-callout">
        <div class="risk-callout__icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="risk-callout__text"><strong>Rủi ro:</strong> BOM sai → quyết toán sai → phạt</div>
    </div>

    <!-- Body -->
    <div class="slide__body">
        <!-- Table -->
        <div class="card panel--table">
            <div class="card__header">
                <div class="card__title"><i class="fas fa-table"></i>Danh sách BOM bất thường</div>
            </div>
            <div class="screenshot-frame">
                <img src="images/slide-22 - BOM Report.jpg" alt="BOM Report" />
            </div>
        </div>

        <!-- Sidebar -->
        <div class="panel--sidebar">
            <div class="card">
                <div class="card__title"><i class="fas fa-chart-pie"></i>Tổng kết</div>
                <div class="summary-list">
                    <div class="summary-row summary-row--default">
                        <span class="summary-row__label">Tổng BOM kiểm tra</span>
                        <span class="summary-row__value">42</span>
                    </div>
                    <div class="summary-row summary-row--green">
                        <div class="summary-row__indicator">
                            <div class="dot dot--green"></div>
                            <span class="summary-row__label">Bình thường</span>
                        </div>
                        <span class="summary-row__value summary-row__value--green">39</span>
                    </div>
                    <div class="summary-row summary-row--red">
                        <div class="summary-row__indicator">
                            <div class="dot dot--red"></div>
                            <span class="summary-row__label">Bất thường</span>
                        </div>
                        <span class="summary-row__value summary-row__value--red">3</span>
                    </div>
                </div>
            </div>
            <div class="card donut-wrapper">
                <div class="donut-label">Tỷ lệ BOM bình thường</div>
                <div class="donut" style="background: conic-gradient(#10b981 0% 92.9%, #ef4444 92.9% 100%);">
                    <div class="donut__inner">92.9%</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="slide__footer">
        <div class="slide__footer-text">
            <i class="fas fa-info-circle"></i>Phát hiện bất thường trong định mức sản xuất — BOM sai → quyết toán sai
        </div>
    </div>
</div>
<script>
function scaleSlide() {
    var slide = document.querySelector('.slide');
    var scaleX = window.innerWidth / 1280;
    var scaleY = window.innerHeight / 720;
    slide.style.transform = 'scale(' + Math.min(scaleX, scaleY) + ')';
}
scaleSlide();
window.addEventListener('resize', scaleSlide);
</script>
</body>
</html>
