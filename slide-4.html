<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Slide 4 - Dashboard Tổng quan</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<style>
    body {
        margin: 0; padding: 0; overflow: hidden;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100vw;
        height: 100vh;
    }

    .slide {
        width: 1280px; height: 720px;
        display: flex; flex-direction: column;
        padding: 22px 50px 18px;
        overflow: hidden;
        transform-origin: center center;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        font-family: 'Montserrat', sans-serif;
        box-sizing: border-box;
    }

    /* Header */
    .slide__header {
        flex-shrink: 0;
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 12px;
    }
    .slide__title {
        font-size: 26px; font-weight: 700; color: #1e293b; margin-bottom: 5px;
    }
    .slide__title-icon { color: #3b82f6; margin-right: 10px; }
    .slide__subtitle { font-size: 14px; color: #64748b; }
    .slide__status {
        background: rgba(59, 130, 246, 0.1);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 8px; padding: 8px 16px;
        font-size: 12px; color: #3b82f6; font-weight: 600;
    }
    .slide__status-active { color: #10b981; }

    /* Body */
    .slide__body {
        flex: 1; min-height: 0;
        display: flex; align-items: center; justify-content: center;
    }
    .slide__screenshot {
        width: 100%; height: 100%;
        object-fit: contain;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        border: 1px solid #e2e8f0;
    }

    /* Footer */
    .slide__footer {
        flex-shrink: 0;
        display: flex; justify-content: space-between; align-items: center;
        padding-top: 10px;
        background: #e2e8f0;
    }
    .slide__footer-text { font-size: 13px; color: #64748b; }
    .slide__footer-icon { margin-right: 8px; color: #3b82f6; }
</style>
</head>
<body>
<div class="slide">
    <!-- Header -->
    <div class="slide__header">
        <div>
            <div class="slide__title">
                <i class="fas fa-tachometer-alt slide__title-icon"></i>
                Dashboard: Tổng quan
            </div>
            <div class="slide__subtitle">Nắm toàn bộ dữ liệu hải quan trong một màn hình</div>
        </div>
        <div class="slide__status">Status: <span class="slide__status-active">Đang hoạt động</span></div>
    </div>

    <!-- Main Content - Screenshot -->
    <div class="slide__body">
        <img src="images/slide-4.jpg" alt="Dashboard Tổng quan" class="slide__screenshot" />
    </div>

    <!-- Footer -->
    <div class="slide__footer">
        <div class="slide__footer-text">
            <i class="fas fa-info-circle slide__footer-icon"></i>
            Dashboard cung cấp tổng quan toàn bộ dữ liệu hải quan trong một màn hình
        </div>
    </div>
</div>
<script>
function scaleSlide() {
    var slide = document.querySelector('.slide');
    var scaleX = window.innerWidth / 1280;
    var scaleY = window.innerHeight / 720;
    slide.style.transform = 'scale(' + Math.min(scaleX, scaleY) + ')';
}
scaleSlide();
window.addEventListener('resize', scaleSlide);
</script>
</body>
</html>
